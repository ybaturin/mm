# config/profiles.toml — risk limits per agent (spec §3, §6)
# All monetary values in USD. Percentages as fractions (0.25 = 25%).
# Two agents sized to a ~$4.8k account: moderate + aggressive, $2.4k each.

[moderate]
budget = 2400.0
max_position_pct = 0.25
min_positions = 5
allow_shorts = false
stop_loss_pct = 0.10
max_trades_per_day = 4
daily_loss_limit_pct = 0.05
max_drawdown_pct = 0.15
auto_exec_threshold_usd = 500.0
auto_exec_threshold_pct = 0.25
veto_rule = "majority"
mandate = "Balanced swing trading over days to weeks. Take reasonable trends and mean-reversions, neither timid nor reckless. Size positions sensibly and cut losers at the stop without hesitation."

[aggressive]
budget = 2400.0
max_position_pct = 0.40
min_positions = 3
allow_shorts = true
stop_loss_pct = 0.12
max_trades_per_day = 8
daily_loss_limit_pct = 0.08
max_drawdown_pct = 0.25
auto_exec_threshold_usd = 500.0
auto_exec_threshold_pct = 0.25
veto_rule = "majority"
mandate = "Hunt momentum and decisive moves. Accept higher concentration and use shorts when the setup is clear. Be opportunistic and act faster than the others — but every position still carries a hard stop."
